{% extends 'base.html' %}
{% block title %}Login – CrochetLux{% endblock %}
{% block content %}
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:90px 20px 40px;background:linear-gradient(135deg,var(--pink-pale),var(--cream))}
.auth-card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(233,30,140,.15)}
.auth-logo{text-align:center;font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--pink);font-weight:700;margin-bottom:8px}
.auth-logo span{color:var(--gold)}
.auth-title{text-align:center;font-size:1.1rem;color:var(--gray);margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.85rem;font-weight:500;margin-bottom:7px;color:var(--text)}
.form-input{width:100%;padding:13px 16px;border:2px solid rgba(233,30,140,.15);border-radius:12px;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;background:#fff;transition:.3s}
.form-input:focus{border-color:var(--pink)}
.auth-alt{text-align:center;margin-top:20px;font-size:.88rem;color:var(--gray)}
.auth-alt a{color:var(--pink);font-weight:600}
</style>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Crochet<span>Lux</span></div>
    <div class="auth-title">Welcome back! Please sign in</div>
    <form method="POST">
      <div class="form-group"><label>Email Address</label><input type="email" name="email" class="form-input" required placeholder="you@example.com"></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" class="form-input" required placeholder="••••••••"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:.95rem">Sign In</button>
    </form>
    <div class="auth-alt">Don't have an account? <a href="/register">Create one</a></div>
  </div>
</div>
{% endblock %}
